# Keybindings
# Debian Laptop Hyprland Profile

$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun

# ------------------------------------------------------------
# Apps / Session
# ------------------------------------------------------------

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, $menu
bind = $mainMod, B, exec, firefox

bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, L, exec, swaylock -f -c 000000

# ------------------------------------------------------------
# Window behavior
# ------------------------------------------------------------

# Toggle floating / fullscreen / pseudo tiling
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen
bind = $mainMod, P, pseudo

# Dwindle layout: change split direction for new windows
bind = $mainMod, J, layoutmsg, togglesplit

# Special workspace as "minimize/scratchpad"
bind = $mainMod, H, movetoworkspace, special
bind = $mainMod SHIFT, H, togglespecialworkspace

# ------------------------------------------------------------
# Focus windows
# ------------------------------------------------------------

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Alternative vim-like focus with ALT, because SUPER+H is scratchpad
bind = $mainMod ALT, H, movefocus, l
bind = $mainMod ALT, L, movefocus, r
bind = $mainMod ALT, K, movefocus, u
bind = $mainMod ALT, J, movefocus, d

# Cycle windows
bind = $mainMod, Tab, cyclenext
bind = $mainMod SHIFT, Tab, swapnext

# ------------------------------------------------------------
# Move windows
# ------------------------------------------------------------

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Vim-like move windows
bind = $mainMod SHIFT ALT, H, movewindow, l
bind = $mainMod SHIFT ALT, L, movewindow, r
bind = $mainMod SHIFT ALT, K, movewindow, u
bind = $mainMod SHIFT ALT, J, movewindow, d

# ------------------------------------------------------------
# Resize active window
# ------------------------------------------------------------

bind = $mainMod CTRL, left, resizeactive, -40 0
bind = $mainMod CTRL, right, resizeactive, 40 0
bind = $mainMod CTRL, up, resizeactive, 0 -40
bind = $mainMod CTRL, down, resizeactive, 0 40

# Fine-tune split ratio
bind = $mainMod ALT, left, splitratio, -0.05
bind = $mainMod ALT, right, splitratio, 0.05
bind = $mainMod ALT, up, splitratio, -0.05
bind = $mainMod ALT, down, splitratio, 0.05

# ------------------------------------------------------------
# Workspaces
# ------------------------------------------------------------

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move window to workspace silently
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

# ------------------------------------------------------------
# Mouse
# ------------------------------------------------------------

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ------------------------------------------------------------
# Screenshots
# ------------------------------------------------------------

# Region screenshot and edit with swappy
bind = , Print, exec, mkdir -p ~/Bilder/Screenshots && grim -g "$(slurp)" - | swappy -f -

# Fullscreen screenshot to file
bind = SHIFT, Print, exec, mkdir -p ~/Bilder/Screenshots && grim ~/Bilder/Screenshots/screenshot-$(date +%F-%H%M%S).png

# Region screenshot to clipboard
bind = CTRL, Print, exec, grim -g "$(slurp)" - | wl-copy

# ------------------------------------------------------------
# Audio keys
# ------------------------------------------------------------

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# ------------------------------------------------------------
# Brightness keys
# ------------------------------------------------------------

bindel = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

