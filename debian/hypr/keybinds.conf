# Keybindings
# Debian Laptop Hyprland Profile

$mainMod = SUPER
$terminal = kitty
$terminal2 = terminator
$fileManager = dolphin
$menu = wofi --show drun

# ------------------------------------------------------------
# Apps / Session
# ------------------------------------------------------------

bind = $mainMod, SPACE, exec, wofi --show drun
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Return, exec, $terminal2
bind = $mainMod, Z, exec, $terminal2
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, wofi --show drun
bind = $mainMod, B, exec, firefox

bind = $mainMod, ESCAPE, exec, wlogout
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, L, exec, swaylock -f -c 000000

# ------------------------------------------------------------
# Window behavior
# ------------------------------------------------------------

# Toggle floating / fullscreen / pseudo tiling
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen
bind = $mainMod, P, pseudo

# Dwindle layout: change split direction for new windows
bind = $mainMod, J, layoutmsg, togglesplit

# Floating rescue
bind = $mainMod SHIFT, C, centerwindow
bind = $mainMod SHIFT, T, bringactivetotop
bind = $mainMod SHIFT, U, alterzorder, top
bind = $mainMod SHIFT, J, alterzorder, bottom
bind = $mainMod SHIFT, P, pin

# Floating + center + bring to top
bind = $mainMod SHIFT, V, exec, hyprctl dispatch togglefloating && hyprctl dispatch centerwindow && hyprctl dispatch bringactivetotop

# Special workspace / scratchpad
bind = $mainMod, H, togglespecialworkspace
bind = $mainMod SHIFT, H, movetoworkspace, special

# Window overview
bind = $mainMod, W, exec, kitty -e sh -c 'hyprctl clients -j | jq -r ".[] | \"WS \(.workspace.id) | Monitor \(.monitor) | \(.class) | \(.title) | address:\(.address)\""; read -p "Press Enter to close..."'

# ------------------------------------------------------------
# Focus windows
# ------------------------------------------------------------

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Alternative vim-like focus
bind = $mainMod ALT, H, movefocus, l
bind = $mainMod ALT, L, movefocus, r
bind = $mainMod ALT, K, movefocus, u
bind = $mainMod ALT, J, movefocus, d

# Cycle windows
bind = $mainMod, Tab, cyclenext
bind = $mainMod SHIFT, Tab, cyclenext, prev

# ------------------------------------------------------------
# Move windows
# ------------------------------------------------------------

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Vim-like move windows
bind = $mainMod SHIFT ALT, H, movewindow, l
bind = $mainMod SHIFT ALT, L, movewindow, r
bind = $mainMod SHIFT ALT, K, movewindow, u
bind = $mainMod SHIFT ALT, J, movewindow, d

# ------------------------------------------------------------
# Resize active window
# ------------------------------------------------------------

# binde = repeat while key is held
binde = $mainMod CTRL, left, resizeactive, -30 0
binde = $mainMod CTRL, right, resizeactive, 30 0
binde = $mainMod CTRL, up, resizeactive, 0 -30
binde = $mainMod CTRL, down, resizeactive, 0 30

# Fine-tune active window size
# Formerly splitratio, replaced because splitratio dispatcher no longer exists
binde = $mainMod ALT, left, resizeactive, -10 0
binde = $mainMod ALT, right, resizeactive, 10 0
binde = $mainMod ALT, up, resizeactive, 0 -10
binde = $mainMod ALT, down, resizeactive, 0 10

# ------------------------------------------------------------
# Workspaces
# ------------------------------------------------------------

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move window to workspace silently
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

# ------------------------------------------------------------
# Mouse
# ------------------------------------------------------------

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ------------------------------------------------------------
# Screenshots
# ------------------------------------------------------------

# Region screenshot and edit with swappy
bind = , Print, exec, mkdir -p ~/Bilder/Screenshots && grim -g "$(slurp)" - | swappy -f -

# Fullscreen screenshot to file
bind = SHIFT, Print, exec, mkdir -p ~/Bilder/Screenshots && grim ~/Bilder/Screenshots/screenshot-$(date +%F-%H%M%S).png

# Region screenshot to clipboard
bind = CTRL, Print, exec, grim -g "$(slurp)" - | wl-copy

# ------------------------------------------------------------
# Audio keys
# ------------------------------------------------------------

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# ------------------------------------------------------------
# Brightness keys
# ------------------------------------------------------------

bindel = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
